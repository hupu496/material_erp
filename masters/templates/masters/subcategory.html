{% extends 'base.html' %}

{% block content %}

<h2>Sub Category Master</h2>

<form method="POST">
{% csrf_token %}

<select name="category">

<option value="">Select Category</option>

{% for c in category %}

<option value="{{c.id}}"
{% if edit.category.id == c.id %}
selected
{% endif %}
>
{{c.name}}
</option>

{% endfor %}

</select>

<input type="text" name="sub_category"
value="{% if edit %}{{edit.sub_category}}{% endif %}"
placeholder="Enter Sub Category">

<button type="submit">

{% if edit %}
Update
{% else %}
Save
{% endif %}

</button>

</form>

<hr>

<h3>SubCategory List</h3>

<table border="1">

<tr>
<th>ID</th>
<th>Category</th>
<th>SubCategory</th>
<th>Action</th>
</tr>

{% for i in data %}

<tr>

<td>{{i.id}}</td>
<td>{{i.category.name}}</td>
<td>{{i.sub_category}}</td>

<td>

<a href="{% url 'subcategory_edit' i.id %}">Edit</a> |

<a href="{% url 'subcategory_delete' i.id %}"
onclick="return confirm('Are you sure?')">Delete</a>

</td>

</tr>

{% endfor %}

</table>

{% endblock %}
