{% extends 'base.html' %}

{% block content %}

<h2>Work Spot</h2>

<form method="POST">
{% csrf_token %}

<input type="text" name="name"
value="{% if edit %}{{edit.name}}{% endif %}"
placeholder="Enter work spot">

<button type="submit">
{% if edit %}Update{% else %}Save{% endif %}
</button>

</form>

<hr>

<table border="1">

<tr>
<th>ID</th>
<th>Name</th>
<th>Action</th>
</tr>

{% for i in data %}

<tr>
<td>{{i.id}}</td>
<td>{{i.name}}</td>

<td>

<a href="{% url 'work_spots_edit' i.id %}">Edit</a> |

<a href="{% url 'work_spots_delete' i.id %}"
onclick="return confirm('Delete?')">Delete</a>

</td>

</tr>

{% endfor %}

</table>

{% endblock %}
