{% extends 'base.html' %}

{% block content %}

<h2>Type Of Seller</h2>

<form method="POST">
{% csrf_token %}

<input type="text" name="type"
value="{% if edit %}{{edit.type}}{% endif %}"
placeholder="Enter Seller Type">

<button type="submit">
{% if edit %}Update{% else %}Save{% endif %}
</button>

</form>

<hr>

<table border="1">

<tr>
<th>ID</th>
<th>Type</th>
<th>Action</th>
</tr>

{% for i in data %}

<tr>
<td>{{i.id}}</td>
<td>{{i.type}}</td>

<td>

<a href="{% url 'seller_type_edit' i.id %}">Edit</a> |

<a href="{% url 'seller_type_delete' i.id %}"
onclick="return confirm('Delete?')">Delete</a>

</td>

</tr>

{% endfor %}

</table>

{% endblock %}
