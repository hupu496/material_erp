{% extends 'base.html' %}
{% block content %}

<h2>Unit Master</h2>

<form method="POST">
{% csrf_token %}

<input type="text" name="name"
value="{% if edit %}{{edit.name}}{% endif %}"
placeholder="Enter Unit">

<button type="submit">
{% if edit %}Update{% else %}Save{% endif %}
</button>

</form>

<hr>

<table border="1">

<tr>
<th>ID</th>
<th>Unit</th>
<th>Action</th>
</tr>

{% for i in data %}

<tr>
<td>{{i.id}}</td>
<td>{{i.name}}</td>
<td>

<a href="{% url 'unit_edit' i.id %}">Edit</a> |
<a href="{% url 'unit_delete' i.id %}">Delete</a>

</td>
</tr>

{% endfor %}

</table>

{% endblock %}
